name: Question
description: Ask a question about the SumUp .NET SDK.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this template for usage questions or clarification requests.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and what is unclear.
      placeholder: Ask your question here.
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Relevant code or context
      description: Share any code, configuration, or API usage that would help explain the question.
      render: csharp
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. 0.9.0
  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK or runtime version
      placeholder: e.g. .NET SDK 9.0.200
  - type: input
    id: target-framework
    attributes:
      label: Target framework
      placeholder: e.g. net8.0
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any extra details that would help us answer.
