name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    if: '!github.event.release.prerelease'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ./codegen/go.mod

      - name: Generate SDK
        working-directory: codegen
        run: go run ./... --spec ../openapi.json --output ../src/SumUp --namespace SumUp

      - name: Check no diff after generation
        run: git diff --exit-code

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SumUp.sln

      - name: Format
        run: dotnet format SumUp.sln --verify-no-changes

      - name: Build
        run: dotnet build SumUp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SumUp.sln --configuration Release --no-build

  publish:
    name: Publish to NuGet
    needs: validate
    runs-on: ubuntu-latest
    if: '!github.event.release.prerelease'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/SumUp/SumUp.csproj --configuration Release --output nuget

      - name: Publish package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push nuget/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
