name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version:
          - '8.0.x'
          - '9.0.x'
          - '10.0.x'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ./codegen/go.mod

      - name: Generate SDK
        working-directory: codegen
        run: go run ./... --spec ../openapi.json --output ../src/SumUp --namespace SumUp

      - name: Go tests
        working-directory: codegen
        run: go test ./...

      - name: Check no diff after generation
        run: git diff --exit-code

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore SumUp.sln

      - name: Format
        run: dotnet format SumUp.sln --verify-no-changes

      - name: Build
        run: dotnet build SumUp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SumUp.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          skip-github-pull-request: "${{ startsWith(github.event.head_commit.message, 'release: ') }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
